<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Mini AI Assistant</title>

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    🤖 <span>Mini AI Assistant</span>
  </header>

  <!-- CHAT AREA -->
  <main id="chatBox" class="chat-box">
    <!-- messages injectés ici -->
  </main>

  <!-- INPUT AREA -->
  <footer class="input-area">

    <input 
      id="input" 
      type="text"
      placeholder="Écris ton message..."
      autocomplete="off"
      onkeydown="if(event.key==='Enter') sendMessage()"
    >

    <button onclick="sendMessage()">
      ➤
    </button>

  </footer>

</div>

<!-- SCRIPTS -->
<script src="data/memory.js"></script>
<script src="ai/ia1.js"></script>
<script src="ai/rules.js"></script>
<script src="ai/ia2.js"></script>
<script src="app.js"></script>

</body>
</html>
